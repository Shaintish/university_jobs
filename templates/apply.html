{% extends "base.html" %}

{% block content %}
<div class="form-card">
    <h2 class="form-title">📝 Подача заявки</h2>
    
    {% if message %}
    <div class="alert success">
        <i class="fas fa-check-circle"></i> {{ message }}
    </div>
    {% endif %}
    
    {% if error %}
    <div class="alert error">
        <i class="fas fa-exclamation-circle"></i> {{ error }}
    </div>
    {% endif %}
    
    <form method="post">
        <div class="form-group">
            <label><i class="fas fa-user"></i> Ваше имя</label>
            <input type="text" name="student_name" placeholder="Иван Иванов" required>
        </div>
        
        <div class="form-group">
            <label><i class="fas fa-envelope"></i> Email</label>
            <input type="email" name="student_email" placeholder="ivan@university.edu" required>
        </div>
        
        <button type="submit" class="btn-primary" style="width: 100%;">
            <i class="fas fa-paper-plane"></i> Отправить заявку
        </button>
    </form>
</div>
{% endblock %}
