{% extends "base.html" %}

{% block content %}
<div class="form-card">
    <h2 class="form-title">➕ Создание вакансии</h2>
    
    {% if message %}
    <div class="alert success">
        <i class="fas fa-check-circle"></i> {{ message }}
    </div>
    {% endif %}
    
    {% if error %}
    <div class="alert error">
        <i class="fas fa-exclamation-circle"></i> {{ error }}
    </div>
    {% endif %}
    
    <form method="post">
        <div class="form-group">
            <label><i class="fas fa-tag"></i> Название вакансии</label>
            <input type="text" name="title" placeholder="Например: Python Developer" required>
        </div>
        
        <div class="form-group">
            <label><i class="fas fa-align-left"></i> Описание</label>
            <textarea name="description" placeholder="Обязанности, требования, условия..." rows="5" required></textarea>
        </div>
        
        <div class="form-group">
            <label><i class="fas fa-building"></i> Отдел</label>
            <input type="text" name="department" placeholder="IT, HR, Marketing, Sales..." required>
        </div>
        
        <div class="form-group">
            <label><i class="fas fa-clock"></i> Тип занятости</label>
            <select name="job_type" required>
                <option value="job">💼 Полная занятость</option>
                <option value="internship">🎓 Стажировка</option>
            </select>
        </div>
        
        <div class="form-group">
            <label><i class="fas fa-ruble-sign"></i> Зарплата (₽)</label>
            <input type="number" name="salary" placeholder="Например: 100000">
        </div>
        
        <button type="submit" class="btn-primary" style="width: 100%;">
            <i class="fas fa-plus"></i> Создать вакансию
        </button>
    </form>
</div>
{% endblock %}
