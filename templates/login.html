{% extends "base.html" %}

{% block content %}
<div class="form-card">
    <h2 class="form-title">Вход в аккаунт</h2>
    
    {% if error %}
    <div class="alert error">{{ error }}</div>
    {% endif %}
    
    <form method="post">
        <div class="form-group">
            <label>Имя пользователя</label>
            <input type="text" name="username" placeholder="Введите имя пользователя" required>
        </div>
        
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" name="password" placeholder="Введите пароль" required>
        </div>
        
        <button type="submit" class="btn-primary" style="width: 100%;">Войти</button>
    </form>
    
    <p style="margin-top: 24px; text-align: center;">
        Нет аккаунта? <a href="/register" style="color: #ff5e3a;">Зарегистрироваться</a>
    </p>
</div>
{% endblock %}
