<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerHub | Центр карьеры</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            color: #1a1a2e;
        }

        /* Анимированный фон */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
        }

        /* Header */
        header {
            background: white;
            box-shadow: 0 1px 0 rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 72px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #ff5e3a, #ff2e00);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon i {
            font-size: 22px;
            color: white;
        }

        .logo-text h1 {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a2e;
        }

        .logo-text p {
            font-size: 12px;
            color: #666;
        }

        /* Навигация */
        .nav-links {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .nav-link {
            text-decoration: none;
            color: #1a1a2e;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 12px;
            transition: all 0.2s ease;
            font-size: 14px;
        }

        .nav-link:hover {
            background: #f0f2f5;
        }

        .nav-link.employer-btn {
            background: #ff5e3a;
            color: white;
        }

        .nav-link.employer-btn:hover {
            background: #ff2e00;
        }

        .nav-link.login-btn {
            background: #1a1a2e;
            color: white;
        }

        .nav-link.login-btn:hover {
            background: #2a2a3e;
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f0f2f5;
            padding: 6px 16px;
            border-radius: 40px;
        }

        .user-menu span {
            font-weight: 500;
            font-size: 14px;
        }

        .logout-link {
            color: #ff5e3a;
            text-decoration: none;
            font-size: 14px;
        }

        /* Контейнер */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 32px;
        }

        /* Герой секция */
        .hero {
            text-align: center;
            margin-bottom: 60px;
        }

        .hero h1 {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #1a1a2e, #ff5e3a);
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
        }

        .hero p {
            font-size: 18px;
            color: #666;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Карточки вакансий */
        .vacancies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 24px;
            margin-top: 20px;
        }

        .vacancy-card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            transition: all 0.3s ease;
            border: 1px solid #eef2f6;
            cursor: pointer;
            position: relative;
        }

        .vacancy-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            border-color: #ff5e3a;
        }

        .vacancy-tag {
            position: absolute;
            top: 20px;
            right: 24px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge.job {
            background: #e8f3ff;
            color: #0052cc;
        }

        .badge.internship {
            background: #fde8e8;
            color: #cc0000;
        }

        .vacancy-title {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 8px;
            padding-right: 80px;
        }

        .vacancy-department {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #666;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .vacancy-description {
            color: #666;
            line-height: 1.5;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .vacancy-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #eef2f6;
        }

        .salary {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a2e;
        }

        .salary small {
            font-size: 12px;
            font-weight: 400;
            color: #666;
        }

        .btn-apply {
            background: #1a1a2e;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-block;
            font-size: 14px;
        }

        .btn-apply:hover {
            background: #ff5e3a;
            transform: translateY(-2px);
        }

        .btn-primary {
            background: #ff5e3a;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary:hover {
            background: #ff2e00;
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            color: #1a1a2e;
            border: 1px solid #eef2f6;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .btn-outline:hover {
            border-color: #ff5e3a;
            color: #ff5e3a;
        }

        /* Формы */
        .form-card {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }

        .form-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 32px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #1a1a2e;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #eef2f6;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #ff5e3a;
            box-shadow: 0 0 0 3px rgba(255,94,58,0.1);
        }

        /* Таблицы */
        .table-container {
            background: white;
            border-radius: 20px;
            padding: 24px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 12px 16px;
            background: #f8fafc;
            font-weight: 600;
            color: #1a1a2e;
        }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid #eef2f6;
        }

        /* Статистика */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-bottom: 48px;
        }

        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            border: 1px solid #eef2f6;
        }

        .stat-number {
            font-size: 32px;
            font-weight: 800;
            color: #ff5e3a;
        }

        .stat-label {
            color: #666;
            margin-top: 8px;
        }

        /* Чат */
        .chat-container {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }

        .chat-header {
            background: #1a1a2e;
            color: white;
            padding: 20px 24px;
        }

        .chat-messages {
            height: 450px;
            overflow-y: auto;
            padding: 24px;
            background: #f8fafc;
        }

        .message {
            margin-bottom: 16px;
            display: flex;
        }

        .message.sent {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 14px;
        }

        .message.sent .message-bubble {
            background: #ff5e3a;
            color: white;
        }

        .message.received .message-bubble {
            background: white;
            color: #1a1a2e;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .chat-input {
            display: flex;
            gap: 12px;
            padding: 20px;
            background: white;
            border-top: 1px solid #eef2f6;
        }

        .chat-input input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #eef2f6;
            border-radius: 12px;
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .header-container {
                padding: 0 20px;
            }
            
            .nav-links {
                gap: 4px;
            }
            
            .nav-link {
                padding: 6px 12px;
                font-size: 12px;
            }
            
            .container {
                padding: 24px 20px;
            }
            
            .hero h1 {
                font-size: 32px;
            }
            
            .vacancies-grid {
                grid-template-columns: 1fr;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }
        }

        .alert {
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 24px;
        }

        .alert.success {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #4caf50;
        }

        .alert.error {
            background: #ffebee;
            color: #c62828;
            border-left: 4px solid #ff5e3a;
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    
    <header>
        <div class="header-container">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <div class="logo-text">
                    <h1>CareerHub</h1>
                    <p>Центр карьеры университета</p>
                </div>
            </div>
            
            <div class="nav-links">
                <a href="/" class="nav-link"><i class="fas fa-home"></i> Вакансии</a>
                <a href="/my-applications" class="nav-link"><i class="fas fa-file-alt"></i> Отклики</a>
                <a href="/my-chats" class="nav-link"><i class="fas fa-comments"></i> Чаты</a>
                <a href="/add-vacancy" class="nav-link"><i class="fas fa-plus"></i> Создать</a>
                
                {% if user and user.role == 'employer' %}
                    <a href="/admin/applications" class="nav-link employer-btn"><i class="fas fa-users-cog"></i> Управление</a>
                {% endif %}
                
                {% if user %}
                    <div class="user-menu">
                        <span><i class="fas fa-user-circle"></i> {{ user.username }}</span>
                        <a href="/logout" class="logout-link">Выйти</a>
                    </div>
                {% else %}
                    <a href="/employer/login" class="nav-link employer-btn"><i class="fas fa-briefcase"></i> Работодатель</a>
                    <a href="/login" class="nav-link login-btn"><i class="fas fa-sign-in-alt"></i> Войти</a>
                    <a href="/register" class="btn-primary" style="padding: 8px 16px;"><i class="fas fa-user-plus"></i> Регистрация</a>
                {% endif %}
            </div>
        </div>
    </header>
    
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
