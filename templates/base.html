<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🎓 CareerHub - Центр карьеры университета</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* ГРАДИЕНТНЫЙ ФОН С АНИМАЦИЕЙ */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(125deg, 
                #1a1a2e 0%, 
                #16213e 25%, 
                #0f3460 50%, 
                #1a1a2e 75%, 
                #16213e 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ЗВЕЗДНЫЙ ФОН (падающие звезды) */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle 3s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        /* ПАРЯЩИЕ КРУГИ */
        .floating-circles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .circle {
            position: absolute;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            animation: float 20s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); }
            25% { transform: translateY(-100px) translateX(50px); }
            50% { transform: translateY(50px) translateX(-80px); }
            75% { transform: translateY(-50px) translateX(100px); }
        }

        /* ВОЛНЫ */
        .waves {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 200px;
            z-index: -1;
            pointer-events: none;
        }

        .wave {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 100% 100% 0 0;
            animation: wave 8s infinite ease-in-out;
        }

        .wave:nth-child(2) {
            bottom: 20px;
            animation-delay: -2s;
            opacity: 0.5;
        }

        .wave:nth-child(3) {
            bottom: 40px;
            animation-delay: -4s;
            opacity: 0.3;
        }

        @keyframes wave {
            0%, 100% { transform: translateY(0) scaleX(1); }
            50% { transform: translateY(-20px) scaleX(1.05); }
        }

        /* Контейнер */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* Header с эффектом стекла */
        header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s ease;
        }

        header:hover {
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            transform: translateY(-2px);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo p {
            color: #666;
            font-size: 0.85rem;
            margin-top: 5px;
        }

        /* Навигация */
        nav {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .nav-link {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            padding: 10px 18px;
            border-radius: 12px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        .nav-link::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 3px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }

        .nav-link:hover::before {
            width: 80%;
        }

        .nav-link:hover {
            background: #f5f5f5;
            transform: translateY(-2px);
        }

        .nav-link.employer {
            background: linear-gradient(135deg, #ff9800, #ff5722);
            color: white;
        }

        .nav-link.employer:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255,152,0,0.3);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            background: linear-gradient(135deg, #f5f5f5, #e8e8e8);
            padding: 8px 20px;
            border-radius: 40px;
            transition: all 0.3s ease;
        }

        .user-info:hover {
            transform: scale(1.02);
        }

        .user-info span {
            color: #333;
            font-weight: 600;
        }

        .logout-btn {
            background: linear-gradient(135deg, #dc3545, #c82333);
            color: white;
            padding: 6px 15px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(220,53,69,0.3);
        }

        /* Карточки вакансий */
        .vacancies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 30px;
            margin-top: 20px;
        }

        .vacancy-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
            border-radius: 24px;
            padding: 28px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .vacancy-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, #667eea, #764ba2, #ff9800);
        }

        .vacancy-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            background: white;
        }

        .vacancy-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 12px;
        }

        .vacancy-department {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
        }

        .vacancy-description {
            color: #666;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .vacancy-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .badge.job {
            background: linear-gradient(135deg, #e3f2fd, #bbdef5);
            color: #1976d2;
        }

        .badge.internship {
            background: linear-gradient(135deg, #f3e5f5, #e1bee7);
            color: #7b1fa2;
        }

        .salary {
            font-size: 1.3rem;
            font-weight: 800;
            color: #28a745;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            border: none;
            border-radius: 14px;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102,126,234,0.4);
        }

        .form-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 50px;
            max-width: 550px;
            margin: 0 auto;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .form-title {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 35px;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #333;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid rgba(0,0,0,0.1);
            border-radius: 16px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: white;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102,126,234,0.1);
            transform: translateY(-2px);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 30px 20px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .stat-card:hover {
            transform: translateY(-8px);
            background: white;
        }

        .stat-number {
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .vacancy-card {
            animation: fadeInUp 0.6s ease forwards;
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            
            .header-content {
                flex-direction: column;
                text-align: center;
            }
            
            .vacancies-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .form-container {
                padding: 25px;
            }
        }

        .alert {
            padding: 15px 20px;
            border-radius: 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: white;
        }

        .alert.success {
            border-left: 5px solid #28a745;
            color: #155724;
        }

        .alert.error {
            border-left: 5px solid #dc3545;
            color: #721c24;
        }
    </style>
</head>
<body>
    <!-- АНИМИРОВАННЫЙ ГРАДИЕНТНЫЙ ФОН -->
    <div class="animated-bg"></div>
    
    <!-- ПАДАЮЩИЕ ЗВЕЗДЫ -->
    <div class="stars" id="stars"></div>
    
    <!-- ПАРЯЩИЕ КРУГИ -->
    <div class="floating-circles" id="circles"></div>
    
    <!-- ВОЛНЫ -->
    <div class="waves">
        <div class="wave"></div>
        <div class="wave"></div>
        <div class="wave"></div>
    </div>

    <div class="container">
        <header>
            <div class="header-content">
                <div class="logo">
                    <h1><i class="fas fa-graduation-cap"></i> CareerHub</h1>
                    <p>Центр карьеры университета</p>
                </div>
                
                <nav>
                    <a href="/" class="nav-link"><i class="fas fa-home"></i> Вакансии</a>
                    <a href="/my-applications" class="nav-link"><i class="fas fa-file-alt"></i> Мои отклики</a>
                    <a href="/my-chats" class="nav-link"><i class="fas fa-comments"></i> Мои чаты</a>
                    <a href="/add-vacancy" class="nav-link"><i class="fas fa-plus-circle"></i> Добавить вакансию</a>
                    
                    {% if user and user.role == 'employer' %}
                        <a href="/admin/applications" class="nav-link employer"><i class="fas fa-users-cog"></i> Управление</a>
                    {% endif %}
                    
                    {% if user %}
                        <div class="user-info">
                            <span><i class="fas fa-user-circle"></i> {{ user.username }}</span>
                            <a href="/logout" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Выйти</a>
                        </div>
                    {% else %}
                        <a href="/employer/login" class="nav-link employer"><i class="fas fa-briefcase"></i> Работодатель</a>
                        <a href="/login" class="nav-link"><i class="fas fa-sign-in-alt"></i> Войти</a>
                        <a href="/register" class="nav-link btn-primary" style="color: white;"><i class="fas fa-user-plus"></i> Регистрация</a>
                    {% endif %}
                </nav>
            </div>
        </header>
        
        {% block content %}{% endblock %}
    </div>

    <script>
        // СОЗДАНИЕ ЗВЕЗД
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            star.style.width = Math.random() * 3 + 1 + 'px';
            star.style.height = star.style.width;
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 5 + 's';
            star.style.animationDuration = 2 + Math.random() * 3 + 's';
            starsContainer.appendChild(star);
        }

        // СОЗДАНИЕ ПАРЯЩИХ КРУГОВ
        const circlesContainer = document.getElementById('circles');
        const sizes = [100, 150, 200, 250, 300];
        for (let i = 0; i < 15; i++) {
            const circle = document.createElement('div');
            circle.classList.add('circle');
            const size = sizes[Math.floor(Math.random() * sizes.length)];
            circle.style.width = size + 'px';
            circle.style.height = size + 'px';
            circle.style.left = Math.random() * 100 + '%';
            circle.style.top = Math.random() * 100 + '%';
            circle.style.animationDelay = Math.random() * 10 + 's';
            circle.style.animationDuration = 15 + Math.random() * 10 + 's';
            circlesContainer.appendChild(circle);
        }
    </script>
</body>
</html>
