{% extends "base.html" %}

{% block content %}
<div class="form-container">
    <h2 class="form-title"><i class="fas fa-briefcase"></i> Вход для работодателя</h2>
    
    {% if error %}
    <div class="alert error">
        <i class="fas fa-exclamation-circle"></i> {{ error }}
    </div>
    {% endif %}
    
    <form method="post">
        <div class="form-group">
            <label><i class="fas fa-user"></i> Логин</label>
            <input type="text" name="username" placeholder="employer" required>
        </div>
        
        <div class="form-group">
            <label><i class="fas fa-lock"></i> Пароль</label>
            <input type="password" name="password" placeholder="admin123" required>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">
            <i class="fas fa-sign-in-alt"></i> Войти
        </button>
    </form>
    
    <p style="margin-top: 20px; text-align: center; color: #666;">
        <i class="fas fa-info-circle"></i> Тестовый доступ: <strong>employer</strong> / <strong>admin123</strong>
    </p>
</div>
{% endblock %}
