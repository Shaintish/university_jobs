{% extends "base.html" %}

{% block content %}
<div class="form-card">
    <h2 class="form-title">👔 Вход для работодателя</h2>
    
    {% if error %}
    <div class="alert error">{{ error }}</div>
    {% endif %}
    
    <form method="post">
        <div class="form-group">
            <label>Логин</label>
            <input type="text" name="username" placeholder="employer" required>
        </div>
        
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" name="password" placeholder="admin123" required>
        </div>
        
        <button type="submit" class="btn-primary" style="width: 100%;">Войти</button>
    </form>
    
    <p style="margin-top: 20px; text-align: center;">
        Тестовый доступ: <strong>employer</strong> / <strong>admin123</strong>
    </p>
</div>
{% endblock %}
